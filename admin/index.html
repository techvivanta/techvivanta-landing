<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel | TechVivanta Blog</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--border:#2e3142;--text:#e4e6ef;--text2:#8b8fa3;--primary:#6366f1;--primary-hover:#5457e5;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--radius:8px}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.screen{display:none}.screen.active{display:block}.form-control{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border .2s}.form-control:focus{border-color:var(--primary)}.form-control::placeholder{color:var(--text2)}textarea.form-control{resize:vertical;font-family:'SF Mono','Consolas',monospace;font-size:13px;line-height:1.6}label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.form-group{margin-bottom:16px}.form-row{display:flex;gap:16px}.form-row .form-group{flex:1}.flex-1{flex:1}.flex-2{flex:2}.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg3)}.btn-sm{padding:6px 14px;font-size:13px}.btn-block{width:100%;justify-content:center}.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}.login-box{max-width:400px;margin:80px auto;padding:40px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}.login-header{text-align:center;margin-bottom:32px}.login-header h1{font-size:22px;margin-bottom:4px}.login-header p{color:var(--text2);font-size:14px}.login-footer{text-align:center;margin-top:20px}.login-footer a{color:var(--text2);font-size:13px;text-decoration:none}.login-footer a:hover{color:var(--primary)}.error-msg{color:var(--red);font-size:13px;margin-bottom:12px}.success-msg{color:var(--green);font-size:13px;margin-bottom:12px;padding:8px 12px;background:rgba(34,197,94,.1);border-radius:var(--radius)}.dashboard-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border)}.header-left{display:flex;align-items:center;gap:16px}.header-title{font-size:18px;font-weight:700}.header-right{display:flex;align-items:center;gap:12px}.repo-status{font-size:12px;color:var(--text2);padding:4px 10px;background:var(--bg3);border-radius:20px}.dashboard-body{max-width:1200px;margin:0 auto;padding:24px}.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.toolbar h2{font-size:20px}.config-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:20px}.config-fields{display:flex;gap:8px;flex:1}.config-fields .form-control{font-size:13px}.loading-indicator{display:flex;align-items:center;gap:10px;padding:16px;color:var(--text2);font-size:14px}.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.blog-list{display:flex;flex-direction:column;gap:8px}.blog-card{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);transition:border-color .2s}.blog-card:hover{border-color:var(--primary)}.blog-card-info{flex:1;min-width:0}.blog-card-title{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.blog-card-meta{font-size:12px;color:var(--text2)}.blog-card-actions{display:flex;gap:6px;flex-shrink:0}.blog-card-actions .btn{padding:4px 10px;font-size:12px}.blog-status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}.blog-status.published{background:var(--green)}.blog-status.draft{background:var(--orange)}.editor-body{max-width:900px;margin:0 auto;padding:24px}.editor-textarea{min-height:400px}.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(100px);opacity:0;transition:all .3s;z-index:9999}.toast.show{transform:translateY(0);opacity:1}.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}@media(max-width:768px){.form-row{flex-direction:column;gap:0}.config-bar{flex-direction:column}.config-fields{flex-direction:column;width:100%}.dashboard-header{flex-direction:column;gap:8px;text-align:center}.blog-card{flex-direction:column;align-items:flex-start;gap:8px}.blog-card-actions{width:100%;justify-content:flex-end}}
  </style>
</head>
<body>
  <div id="app">
    <div id="loginScreen" class="screen active">
      <div class="login-box">
        <div class="login-header">
          <img src="/assets/app-icons/logo.png" alt="TechVivanta" style="max-width: 160px; margin-bottom: 8px;" />
          <h1>Blog Admin</h1>
          <p>Sign in to manage your blog</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password" />
          </div>
          <div id="loginError" class="error-msg"></div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <div class="login-footer">
          <a href="/blog.html">&larr; Back to Blog</a>
        </div>
      </div>
    </div>

    <div id="dashboardScreen" class="screen">
      <header class="dashboard-header">
        <div class="header-left">
          <img src="/assets/app-icons/logo.png" alt="TechVivanta" style="max-width: 120px;" />
          <span class="header-title">Blog Manager</span>
        </div>
        <div class="header-right">
          <span id="repoStatus" class="repo-status"></span>
          <button id="logoutBtn" class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
        </div>
      </header>

      <div class="dashboard-body">
        <div class="toolbar">
          <h2>All Blog Posts</h2>
          <button class="btn btn-primary" onclick="openEditor()">+ New Post</button>
        </div>

        <div id="githubConfig" class="config-bar">
          <div class="config-fields">
            <input type="text" id="ghRepo" class="form-control form-control-sm" placeholder="owner/repo (e.g., techvivanta/techvivanta-landing)" />
            <input type="password" id="ghToken" class="form-control form-control-sm" placeholder="GitHub Personal Access Token" />
          </div>
          <button class="btn btn-sm btn-outline" onclick="connectGitHub()">Connect</button>
        </div>

        <div id="loadingIndicator" class="loading-indicator" style="display:none;">
          <div class="spinner"></div>
          <span>Syncing with GitHub...</span>
        </div>

        <div id="blogList" class="blog-list">
        </div>
      </div>
    </div>

    <div id="editorScreen" class="screen">
      <header class="dashboard-header">
        <div class="header-left">
          <span class="header-title" id="editorTitle">New Blog Post</span>
        </div>
        <div class="header-right">
          <button class="btn btn-sm btn-outline" onclick="closeEditor()">Cancel</button>
          <button class="btn btn-sm btn-primary" onclick="saveBlog()">Save to GitHub</button>
        </div>
      </header>

      <div class="editor-body">
        <div id="editorError" class="error-msg" style="display:none;"></div>
        <div id="editorSuccess" class="success-msg" style="display:none;"></div>

        <div class="form-row">
          <div class="form-group flex-2">
            <label for="editTitle">Title *</label>
            <input type="text" id="editTitle" class="form-control" placeholder="Blog post title" required />
          </div>
          <div class="form-group flex-1">
            <label for="editSlug">Slug *</label>
            <input type="text" id="editSlug" class="form-control" placeholder="url-friendly-slug" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label for="editCategory">Category</label>
            <input type="text" id="editCategory" class="form-control" placeholder="e.g., Web Development" />
          </div>
          <div class="form-group flex-1">
            <label for="editDate">Date Published</label>
            <input type="date" id="editDate" class="form-control" />
          </div>
          <div class="form-group flex-1">
            <label for="editReadingTime">Reading Time</label>
            <input type="text" id="editReadingTime" class="form-control" placeholder="e.g., 5 min read" />
          </div>
        </div>

        <div class="form-group">
          <label for="editDescription">Meta Description / Excerpt</label>
          <textarea id="editDescription" class="form-control" rows="2" placeholder="Brief description for search results and blog listing"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group flex-2">
            <label for="editImage">Image Path</label>
            <input type="text" id="editImage" class="form-control" placeholder="assets/img/blog/your-image.jpg" />
          </div>
          <div class="form-group flex-1">
            <label for="editAlt">Image Alt Text</label>
            <input type="text" id="editAlt" class="form-control" placeholder="Describe the image" />
          </div>
        </div>

        <div class="form-group">
          <label for="editContent">Content (HTML) *</label>
          <textarea id="editContent" class="form-control editor-textarea" rows="16" placeholder="<p>Write your blog content in HTML...</p>"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label for="editPrev">Previous Post Slug</label>
            <input type="text" id="editPrev" class="form-control" placeholder="previous-post-slug" />
          </div>
          <div class="form-group flex-1">
            <label for="editNext">Next Post Slug</label>
            <input type="text" id="editNext" class="form-control" placeholder="next-post-slug" />
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-outline" onclick="closeEditor()">Cancel</button>
          <button class="btn btn-primary" onclick="saveBlog()">Save to GitHub</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
